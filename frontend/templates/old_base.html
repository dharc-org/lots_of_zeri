<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZAC — {% block title %}Zeri Auction Catalogues{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>

{# ── Header ── #}
<header class="zac-header d-flex align-items-center justify-content-between">
  <a href="/" style="text-decoration:none">
    <div class="brand-name">ZAC</div>
    <div class="brand-sub">Zeri Auction Catalogues</div>
  </a>
  <div class="text-end">
    <div class="brand-date">Fondazione Federico Zeri · Università di Bologna</div>
    <div class="brand-date mt-1">1860 — 1940</div>
  </div>
</header>

{# ── Tabs ── #}
<div class="zac-tabs">
  <ul class="nav nav-tabs border-0 ms-2">
    <li class="nav-item">
      <a href="/eventi"  class="nav-link {% if active_tab == 'eventi'   %}active{% endif %}">
        <i class="bi bi-hammer me-1"></i>Aste
      </a>
    </li>
    <li class="nav-item">
      <a href="/catalogo" class="nav-link {% if active_tab == 'catalogo' %}active{% endif %}">
        <i class="bi bi-journal-text me-1"></i>Cataloghi
      </a>
    </li>
    <li class="nav-item">
      <span class="nav-link disabled">
        <i class="bi bi-grid me-1"></i>Lotti
        <span class="tab-badge" style="background:#ccc">WIP</span>
      </span>
    </li>
  </ul>
</div>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
