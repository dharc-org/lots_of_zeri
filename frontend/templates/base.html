<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZAC — {% block title %}Zeri Auction Catalogues{% endblock %}</title>
  <script>window.BASE_PATH = "{{ base_path }}";</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.css" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="{{ base_path }}/static/css/style.css" rel="stylesheet">
  {% block styles %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">

  {% include "partials/_nav.html" %}

  {% include "partials/_loading_bar.html" %}

  {% block content %}{% endblock %}

  {% include "partials/_footer.html" %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var h = document.querySelector('.navbar').offsetHeight;
      var tabs = document.querySelector('.zac-catalogue-tabs');
      if (tabs) tabs.style.top = h + 'px';
    });
  </script>

  {% block scripts %}{% endblock %}
<script src="{{ base_path }}/static/js/sidebar.js"></script>
</body>
</html>
