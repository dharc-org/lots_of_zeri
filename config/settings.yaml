# ZAC Platform — Application Settings
# Nota: qui stanno solo le chiavi effettivamente lette dal codice
# (main.py, config.py). Il base path per il deploy sotto prefisso
# viene dalla variabile d'ambiente ZAC_BASE_PATH (docker-compose),
# host/port/workers dal CMD del Dockerfile.

# QLever Triplestore
triplestore:
  host: "qlever"        # nome del servizio in docker-compose
  port: 7001
  endpoint: "/api"
  named_graph: "http://w3id.org/zac/catalogues"

# Pagination
pagination:
  default_page_size: 20
  max_page_size: 100