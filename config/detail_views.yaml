# ZAC Platform — Detail View Configuration
# Descrive le schede di dettaglio in modo config-driven.
# Il router fa il merge fra i dati SPARQL (per blocco) e questa config,
# producendo il dict `view` che detail.html renderizza genericamente.
#
# Aggiungere un nuovo tipo (es. "lotto") = aggiungere una voce qui
# + le relative query in sparql_queries.yaml. Zero nuovo template.
#
# ── Anatomia di un tipo ──────────────────────────────────────────
#   back:        link "torna a…" (url + label)
#   has_viewer:  se true, mostra il blocco visore IIIF (placeholder per ora)
#   sections:    voci dell'indice di navigazione laterale (anchor → label)
#   fields:      righe della scheda <dl>
#       key:        chiave restituita dalla query 'scalars' (o blocco dedicato)
#       label_it:   etichetta mostrata
#       multi:      true = lista di valori (blocco dedicato), false = scalare
#       link_route: opz. — rotta interna; {slug}/{id} sostituiti col valore del campo *_link
#       link_key:   opz. — chiave che contiene lo slug/id per il link
#       pill:       opz. — render come "pill" invece che testo semplice
#   related:     caroselli di entità correlate
#       id:         identificatore del blocco (= query-key in sparql_queries.detail)
#       title_it:   titolo del carosello
#       card:       layout della card (catalogo | evento | lotto)
#       count_label_it: testo accanto al conteggio ("lotti totali", "cataloghi correlati"…)
#       placeholder: opz. — se true, blocco mostrato vuoto (dati non ancora presenti)

# ZAC Platform — Detail View Configuration
# Descrive le schede di dettaglio in modo config-driven.
# Il router generico (browse.py → _register_detail_route) legge:
#   - query_blocks : quali query SPARQL lanciare e come (scalars, multis, related)
#   - back/switch/sections/fields/related : come costruire il dict `view`
# detail.html renderizza `view` genericamente.
#
# Aggiungere un tipo nuovo (es. "lotto") = aggiungere una voce qui
# + le query in sparql_queries.yaml + 'detail_kind: lotto' nel route di facets.yaml.

# ════════════════════════════════════════════════════════════════
catalogo:
  back:
    url: "/cataloghi"
    label_it: "Torna ai cataloghi"
  has_viewer: true
  switch:
    - { label_it: "Asta",        link_key: "auctionSlug", route: "/aste/{slug}" }
    - { label_it: "lista Lotti", disabled: true }

  sections:
    - { anchor: "viewer",  label_it: "Sfoglia il catalogo" }
    - { anchor: "scheda",  label_it: "Scheda catalografica" }
    - { anchor: "lotti",   label_it: "Lotti correlati" }
    - { anchor: "related", label_it: "Cataloghi correlati" }

  fields:
    - { key: "title",      label_it: "Titolo",                multi: false }
    - { key: "secTitle",   label_it: "Titolo alternativo",    multi: false }
    - { key: "author",      label_it: "Autore / Casa d'asta",  multi: true,
        facet_link: { route: "/cataloghi", param: "autori" } }
    - { key: "secondary_author_organisation",  label_it: "Autore secondario (ente)", multi: true,
        facet_link: { route: "/cataloghi", param: "autori" } }
    - { key: "secondary_author_person",  label_it: "Autore secondario (persona)", multi: true,
        facet_link: { route: "/cataloghi", param: "autori" } }
    - { key: "auctioneer", label_it: "Banditore",        multi: true, 
        facet_link: { route: "/aste", param: "banditore" } }     
    - { key: "year", label_it: "Anno di pubblicazione", multi: false,
        facet_link: { route: "/cataloghi", param: "anno_pubblicazione", kind: "range_year" } }
    - { key: "languages", label_it: "Lingua", multi: true }    
    - { key: "illustrated", label_it: "Illustrato", multi: false }
    - { key: "docId",      label_it: "Numero di inventario",  multi: false }
    - { key: "auctionLabel",    label_it: "Vendita all'asta",      multi: false,
        link_route: "/aste/{slug}", link_key: "auctionSlug" }

  related:
    - id: "catalogo_lotti"
      title_it: "Lotti nel catalogo"
      card: "lotto"
      count_label_it: "lotti nel catalogo"
      placeholder: true
    - id: "catalogo_related_year"
      title_it: "Altri cataloghi dello stesso anno"
      card: "catalogo"
      count_label_it: "cataloghi dello stesso anno"

  # Quali query lanciare e come (lette dal router generico)
  query_blocks:
    scalars: "catalogo_scalars"
    multis:
      author:       "catalogo_author"
      secondary_author_organisation: "catalogo_secondary_author_organisation"
      secondary_author_person: "catalogo_secondary_author_person"
      auctioneer: "catalogo_auctioneer"
      languages:    "catalogo_languages"
    related:
      catalogo_related_year:
        query:      "catalogo_related_year"
        depends_on: "year"           # chiave scalare da cui prendere il valore
        transform:  "year4"          # estrai 4 cifre anno → {year}

# ════════════════════════════════════════════════════════════════
evento:
  back:
    url: "/aste"
    label_it: "Torna alle aste"
  has_viewer: false
  switch:
    - { label_it: "Catalogo",    link_key: "docSlug", route: "/cataloghi/{slug}" }
    - { label_it: "lista Lotti", disabled: true }
 
  sections:
    - { anchor: "scheda",  label_it: "Scheda catalografica" }
    - { anchor: "lotti",   label_it: "Lotti in vendita" }
    - { anchor: "related", label_it: "Aste correlate" }
 
  fields:
    - { key: "label",           label_it: "Titolo",                    multi: false }
    - { key: "organizzatori",   label_it: "Organizzatore",             multi: true,
        facet_link: { route: "/aste", param: "organizzatore" } }
    - { key: "organizzazioni",  label_it: "Organizzazioni coinvolte",  multi: true,
        facet_link: { route: "/aste", param: "organizzatore" } }
    - { key: "banditori",       label_it: "Banditore",                 multi: true,
        facet_link: { route: "/aste", param: "banditore" } }
    - { key: "persone",         label_it: "Persone coinvolte",         multi: true,
        facet_link: { route: "/aste", param: "organizzatore" } }
    - { key: "dateStart",       label_it: "Data inizio asta",          multi: false }
    - { key: "dateEnd",         label_it: "Data fine asta",            multi: false }
    - { key: "place",           label_it: "Luogo di vendita",          multi: false,
        facet_link: { route: "/aste", param: "luogo", uri_key: "placeURI" } }
    - { key: "collezioni",      label_it: "Collezione in vendita",     multi: true,
        facet_link: { route: "/cataloghi", param: "collezione" } }
    - { key: "auctionCode",     label_it: "Codice asta",               multi: false }
    - { key: "object_periods",  label_it: "Cronologia oggetti",        multi: true, pill: true }
    - { key: "object_types",    label_it: "Tipologia oggetti",         multi: true, pill: true,
        facet_link: { route: "/aste", param: "tipologia_oggetti" } }
    - { key: "docLabel",        label_it: "Catalogo",                  multi: false,
        link_route: "/cataloghi/{slug}", link_key: "docSlug" }
 
  related:
    - id: "evento_lotti"
      title_it: "Lotti in vendita nell'asta"
      card: "lotto"
      count_label_it: "lotti in vendita"
      placeholder: true
    - id: "evento_related_house"
      title_it: "Aste correlate"
      card: "evento"
      count_label_it: "aste della stessa casa d'asta"
 
  query_blocks:
    scalars: "evento_scalars"
    multis:
      organizzatori:  "evento_organizzatori"
      organizzazioni: "evento_organizzazioni"
      banditori:      "evento_banditori"
      persone:        "evento_persone"
      collezioni:     "evento_collezioni"
      object_types:   "evento_object_types"
      object_periods: "evento_object_periods"
    related:
      evento_related_house:
        query:      "evento_related_house"
        depends_on: "house"
        transform:  "sparql_literal"