# ZAC SPARQL Query Templates

prefixes: |
  PREFIX crm: <http://www.cidoc-crm.org/cidoc-crm/>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
  PREFIX aat: <http://vocab.getty.edu/aat/>
  PREFIX zac: <http://w3id.org/zac/>

# ─────────────────────────────────────────
# FACET VALUE QUERIES
# Key format: {tab}__{facet_id}
# Each query MUST return:
#   ?facetURI   (URI dell'entità — usato come valore del filtro)
#   ?facetValue (label display — mostrato nell'UI)
#   ?count      (int)
# Per le faccette non-entità (anno, boolean) ?facetURI = ?facetValue (stringa).
# {FILTERS} iniettato escludendo la faccetta corrente (cross-filtering).
# ─────────────────────────────────────────
facet_queries:

  eventi_asta__organizzatore: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_act .
      ?sub_act crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      ?house rdfs:label ?facetValue .
      BIND(?house AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__banditore: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_act .
      ?sub_act a crm:E7_Activity ;
        crm:P2_has_type zac:auctioneering ;
        crm:P14_carried_out_by ?auctioneer .
      ?auctioneer rdfs:label ?facetValue .
      BIND(?auctioneer AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__tipologia_oggetti: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P125_used_objects_of_type ?obj_type .
      ?obj_type crm:P2_has_type zac:object_type ;
        rdfs:label ?facetValue .
      BIND(?obj_type AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__cronologia_oggetti: |
      SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
      WHERE {
        ?auction a crm:E7_Activity ;
          crm:P2_has_type aat:300054751 ;
          crm:P125_used_objects_of_type ?obj_period .
        ?obj_period crm:P2_has_type zac:object_period ;
          rdfs:label ?facetValue .
        BIND(?obj_period AS ?facetURI)
        {FILTERS}
      }
      GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__periodo__range: |
    SELECT (MIN(?ys) AS ?minYear) (MAX(?ye) AS ?maxYear)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P4_has_time-span ?ts .
      ?ts crm:P82a_begin_of_the_begin ?dateStart ;
          crm:P82b_end_of_the_end ?dateEnd .
      BIND(YEAR(?dateStart) AS ?ys)
      BIND(YEAR(?dateEnd) AS ?ye)
      {FILTERS}
    }

  eventi_asta__luogo: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P7_took_place_at ?place .
      ?place rdfs:label ?facetValue .
      BIND(?place AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  # boolean: ?facetURI = ?facetValue (stringa "true"/"false")
  cataloghi__illustrazioni: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ; crm:P2_has_type aat:300026068 .
      OPTIONAL { ?doc crm:P2_has_type zac:illustrated . BIND("true" AS ?ill) }
      BIND(IF(BOUND(?ill), "true", "false") AS ?facetValue)
      BIND(IF(BOUND(?ill), "true", "false") AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue

  # anno: ?facetURI = ?facetValue (stringa anno)
  cataloghi__anno_pubblicazione: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P94i_was_created_by ?cr .
      ?cr crm:P82_at_some_time_within ?y .
      BIND(STR(YEAR(?y)) AS ?facetValue)
      BIND(STR(YEAR(?y)) AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY ?facetValue

  cataloghi__lingua: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P72_has_language ?lang .
      ?lang rdfs:label ?facetValue .
      FILTER(BOUND(?facetValue) && STR(?facetValue) != "NaN")
      BIND(?lang AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 100

  cataloghi__autori: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P94i_was_created_by ?creation .
      ?assign a crm:E13_Attribute_Assignment ;
        crm:P140_assigned_attribute_to ?creation ;
        crm:P141_assigned ?contrib .
      ?contrib rdfs:label ?facetValue .
      BIND(?contrib AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  cataloghi__collezione: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P70_documents ?auction .
      ?auction crm:P16_used_specific_object ?coll .
      ?coll a crm:E78_Curated_Holding ;
            rdfs:label ?facetValue .
      BIND(?coll AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY ?facetValue LIMIT 200

  cataloghi__luogo: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P70_documents ?auction .
      ?auction crm:P7_took_place_at ?place .
      ?place rdfs:label ?facetValue .
      BIND(?place AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY ?facetValue LIMIT 200

  cataloghi__tipologia_oggetti: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P70_documents ?auction .
      ?auction crm:P2_has_type ?obj_type .
      ?obj_type crm:P2_has_type zac:object_type ;
                rdfs:label ?facetValue .
      BIND(?obj_type AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200


# ─────────────────────────────────────────
# FILTER SNIPPETS
# Per multiselect: VALUES su ?uri (non sulla label).
# Placeholder {values_clause} = lista di URI angolati: <uri1> <uri2>
# ─────────────────────────────────────────
filter_snippets:

  eventi_asta__periodo:
    year_range: |
      ?auction crm:P4_has_time-span ?ts .
      ?ts crm:P82a_begin_of_the_begin ?dateStart .
      FILTER(YEAR(?dateStart) >= {year_from} && YEAR(?dateStart) <= {year_to})

  eventi_asta__organizzatore:
    multiselect: |
      ?auction crm:P9_consists_of ?organisation .
      ?organisation crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      VALUES ?house { {values_clause} }

  eventi_asta__banditore:
    multiselect: |
      ?auction crm:P9_consists_of ?auctioneering .
      ?auctioneering crm:P2_has_type zac:auctioneering ;
        crm:P14_carried_out_by ?auctioneer .
      VALUES ?auctioneer { {values_clause} }

  eventi_asta__tipologia_oggetti:
    multiselect: |
      ?auction crm:P125_used_objects_of_type ?obj_type .
      ?obj_type crm:P2_has_type zac:object_type .
      VALUES ?obj_type { {values_clause} }

  eventi_asta__cronologia_oggetti:
      multiselect: |
        ?auction crm:P125_used_objects_of_type ?obj_period .
        ?obj_period crm:P2_has_type zac:object_period .
        VALUES ?obj_period { {values_clause} }

  eventi_asta__luogo:
    multiselect: |
      ?auction crm:P7_took_place_at ?place .
      VALUES ?place { {values_clause} }

  # Ricerca libera per parola chiave — usata dalla barra di ricerca
  # Effettua la corrispondenza su: etichetta asta, casa d'asta, banditore, luogo
  eventi_asta___search:
    text_search: |
      ?auction rdfs:label ?searchLabel .
      FILTER(CONTAINS(LCASE(STR(?searchLabel)), LCASE("{text_value}")))

  cataloghi__anno_pubblicazione:
    year_range: |
      ?doc crm:P94i_was_created_by ?cr_yr .
      ?cr_yr crm:P82_at_some_time_within ?filter_yr .
      FILTER(YEAR(?filter_yr) >= {year_from} && YEAR(?filter_yr) <= {year_to})

  cataloghi__lingua:
    multiselect: |
      ?doc crm:P72_has_language ?lang .
      VALUES ?lang { {values_clause} }

  cataloghi__illustrazioni:
    boolean_true: |
      ?doc crm:P2_has_type zac:illustrated .
    boolean_false: |
      FILTER NOT EXISTS { ?doc crm:P2_has_type zac:illustrated . }

  cataloghi__autori:
    multiselect: |
      ?doc crm:P94i_was_created_by ?cr_c .
      ?asg_f a crm:E13_Attribute_Assignment ;
        crm:P140_assigned_attribute_to ?cr_c ;
        crm:P141_assigned ?contrib_f .
      VALUES ?contrib_f { {values_clause} }

  cataloghi__collezione:
    multiselect: |
      ?doc crm:P70_documents ?auction .
      ?auction crm:P16_used_specific_object ?coll_f .
      ?coll_f a crm:E78_Curated_Holding .
      VALUES ?coll_f { {values_clause} }

  cataloghi__luogo:
    multiselect: |
      ?doc crm:P70_documents ?auction .
      ?auction crm:P7_took_place_at ?place_f .
      VALUES ?place_f { {values_clause} }

  cataloghi__tipologia_oggetti:
    multiselect: |
      ?doc crm:P70_documents ?auction .
      ?auction crm:P2_has_type ?obj_type_f .
      ?obj_type_f crm:P2_has_type zac:object_type .
      VALUES ?obj_type_f { {values_clause} }

  # Ricerca libera per parola chiave — usata dalla barra di ricerca
  # Effettua la corrispondenza su: titolo, sottotitolo, identificativo, autori/casa d'asta
  cataloghi___search:
    text_search: |
      ?doc crm:P102_has_title ?searchTitleNode .
      ?searchTitleNode rdfs:label ?searchLabel .
      FILTER(CONTAINS(LCASE(STR(?searchLabel)), LCASE("{text_value}")))


# ─────────────────────────────────────────
# MAIN RESULT QUERIES
# ─────────────────────────────────────────
results:

  eventi_asta: |
    SELECT DISTINCT ?auction ?auctionLabel ?houseLabel ?yearLabel ?placeLabel
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 .
      OPTIONAL {
        ?auction crm:P9_consists_of ?organisation .
        ?organisation crm:P2_has_type zac:auction_organisation ;
          crm:P14_carried_out_by ?house .
        ?house rdfs:label ?houseLabel .
      }
      OPTIONAL { ?auction rdfs:label ?auctionLabel }
      OPTIONAL {
        ?auction crm:P4_has_time-span ?ts .
        ?ts rdfs:label ?yearLabel .
      }
      OPTIONAL {
        ?auction crm:P7_took_place_at ?place .
        ?place rdfs:label ?placeLabel .
      }
      {FILTERS}
    }
    ORDER BY {ORDER}
    LIMIT {limit}
    OFFSET {offset}

  eventi_asta_count: |
    SELECT (COUNT(DISTINCT ?auction) AS ?total)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        rdfs:label ?auctionLabel .
      {FILTERS}
    }

  catalogo: |
    SELECT DISTINCT ?doc ?docId ?title ?year ?houseLabel ?langLabel ?illustrated
    WHERE {
        ?doc a crm:E31_Document ;
             crm:P2_has_type aat:300026068 .
        
        OPTIONAL { 
          ?doc crm:P48_has_preferred_identifier ?idNode . 
          ?idNode rdfs:label ?docId 
          }

        OPTIONAL {
          ?doc crm:P102_has_title ?tn .
          ?tn crm:P2_has_type zac:primary_title ; rdfs:label ?title .
        }
        OPTIONAL {
          ?doc crm:P94i_was_created_by ?creation .
          ?creation crm:P82_at_some_time_within ?year .
        }
        OPTIONAL {
          ?doc crm:P72_has_language ?lang .
          ?lang rdfs:label ?langLabel .
        }
        OPTIONAL {
          ?doc crm:P14_carried_out_by ?house .
          ?house rdfs:label ?houseLabel .
        }
        OPTIONAL {
          ?doc crm:P2_has_type zac:illustrated .
          BIND("true" AS ?illustrated)
        }
        {FILTERS}
    }
    ORDER BY {ORDER}
    LIMIT {limit}
    OFFSET {offset}

  catalogo_count: |
    SELECT (COUNT(DISTINCT ?doc) AS ?total)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 .
      {FILTERS}
    }


# ─────────────────────────────────────────
# DETAIL QUERIES
# ─────────────────────────────────────────
detail:

  # ── CATALOGO ───────────────────────────────────────────────────

  # Campi scalari + chiavi per i link interni (auctionSlug, docId)
  catalogo_scalars: |
    SELECT DISTINCT ?title ?secTitle ?year ?illustrated ?docId ?auction ?auctionSlug ?auctionLabel
    WHERE {
        <{uri}> a crm:E31_Document .
        OPTIONAL { <{uri}> crm:P48_has_preferred_identifier ?idNode . ?idNode rdfs:label ?docId }
        OPTIONAL {
          <{uri}> crm:P102_has_title ?tn .
          ?tn crm:P2_has_type zac:primary_title ; rdfs:label ?title .
        }
        OPTIONAL {
          <{uri}> crm:P102_has_title ?tn2 .
          ?tn2 crm:P2_has_type zac:secondary_title ; rdfs:label ?secTitle .
        }
        OPTIONAL {
          <{uri}> crm:P94i_was_created_by ?cr .
          ?cr crm:P82_at_some_time_within ?year .
        }

        BIND(IF(EXISTS { <{uri}> crm:P2_has_type zac:illustrated }, "Sì", "No") AS ?illustrated)

        OPTIONAL {
          <{uri}> crm:P70_documents ?auction .
          ?auction rdfs:label ?auctionLabel .
          BIND(REPLACE(STR(?auction), "^.*/", "") AS ?auctionSlug)
        }
    }
    LIMIT 1

  catalogo_author: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P94i_was_created_by ?cr_c .
        ?asg_f a crm:E13_Attribute_Assignment ;
          crm:P140_assigned_attribute_to ?cr_c ;
          crm:P141_assigned ?house ;
          crm:P2_has_type aat:300025492 .
        BIND(?house AS ?uri)
        ?house rdfs:label ?value .
    }
    ORDER BY ?value

  catalogo_secondary_author_organisation: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P94i_was_created_by ?cr_c .
        ?asg_f a crm:E13_Attribute_Assignment ;
          crm:P140_assigned_attribute_to ?cr_c ;
          crm:P141_assigned ?org ;
          crm:P2_has_type zac:secondary_author .
        ?org a crm:E74_Group.
        BIND(?org AS ?uri)
        ?org rdfs:label ?value .
    }
    ORDER BY ?value
  
  catalogo_secondary_author_person: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P94i_was_created_by ?cr_c .
        ?asg_f a crm:E13_Attribute_Assignment ;
          crm:P140_assigned_attribute_to ?cr_c ;
          crm:P141_assigned ?prs ;
          crm:P2_has_type zac:secondary_author .
        ?prs a crm:E21_Person.
        BIND(?prs AS ?uri)
        ?prs rdfs:label ?value .
    }
    ORDER BY ?value
    
  catalogo_auctioneer: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P70_documents ?auction .
        ?auction crm:P9_consists_of ?auctioneering .
        ?auctioneering crm:P2_has_type zac:auctioneering ;
          crm:P14_carried_out_by ?auct .
        BIND(?auct AS ?uri)
        ?auct rdfs:label ?value .
    }
    ORDER BY ?value

  # Lingue (multivalore)
  catalogo_languages: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P72_has_language ?lang .
        BIND(?lang AS ?uri)
        ?lang rdfs:label ?value .
    }
    ORDER BY ?value

  # Correlati: altri cataloghi dello stesso anno (escluso il corrente)
  # {me} = URI corrente, {year} = anno (passato dal router dopo gli scalari)
  catalogo_related_year: |
    SELECT DISTINCT ?uri ?docId ?title ?year
    WHERE {
        ?uri a crm:E31_Document ;
             crm:P2_has_type aat:300026068 ;
             crm:P94i_was_created_by ?cr .
        ?cr crm:P82_at_some_time_within ?year .
        FILTER(YEAR(?year) = {year})
        FILTER(?uri != <{me}>)
        OPTIONAL { ?uri crm:P48_has_preferred_identifier ?docId }
        OPTIONAL {
          ?uri crm:P102_has_title ?tn .
          ?tn crm:P2_has_type zac:primary_title ; rdfs:label ?title .
        }
    }
    ORDER BY ?title
    LIMIT 12

  # ── EVENTO ─────────────────────────────────────────────────────

  evento_scalars: |
    SELECT DISTINCT ?label ?house ?auctioneer ?time_span ?place ?docId
    WHERE {
        <{uri}> a crm:E7_Activity .
        OPTIONAL { <{uri}> rdfs:label ?label }
        OPTIONAL {
          <{uri}> crm:P9_consists_of ?org .
          ?org crm:P2_has_type zac:auction_organisation ;
            crm:P14_carried_out_by ?h .
          ?h rdfs:label ?house .
        }
        OPTIONAL {
          <{uri}> crm:P9_consists_of ?auc .
          ?auc crm:P2_has_type zac:auctioneering ;
            crm:P14_carried_out_by ?a .
          ?a rdfs:label ?auctioneer .
        }
        OPTIONAL { <{uri}> crm:P4_has_time-span ?ts . ?ts rdfs:label ?time_span . }
        OPTIONAL { <{uri}> crm:P7_took_place_at ?pl . ?pl rdfs:label ?place . }
        OPTIONAL {
          ?doc crm:P70_documents <{uri}> .
          ?doc crm:P48_has_preferred_identifier ?docId .
        }
    }
    LIMIT 1

  # Tipologie oggetti (multivalore)
  evento_object_types: |
    SELECT DISTINCT ?value
    WHERE {
        <{uri}> crm:P125_used_objects_of_type ?otype .
        ?otype crm:P2_has_type zac:object_type ; rdfs:label ?value .
    }
    ORDER BY ?value

  # Correlati: altre aste della stessa casa d'asta (organizzatore), escluso il corrente
  # {house} = label casa (passata dal router dopo gli scalari)
  evento_related_house: |
    SELECT DISTINCT ?uri ?label ?house ?yearLabel ?place
    WHERE {
        ?uri a crm:E7_Activity ;
             crm:P2_has_type aat:300054751 ;
             crm:P9_consists_of ?org .
        ?org crm:P2_has_type zac:auction_organisation ;
             crm:P14_carried_out_by ?h .
        ?h rdfs:label ?house .
        FILTER(STR(?house) = "{house}")
        FILTER(?uri != <{me}>)
        OPTIONAL { ?uri rdfs:label ?label }
        OPTIONAL { ?uri crm:P4_has_time-span ?ts . ?ts rdfs:label ?yearLabel . }
        OPTIONAL { ?uri crm:P7_took_place_at ?pl . ?pl rdfs:label ?place . }
    }
    ORDER BY ?yearLabel
    LIMIT 12