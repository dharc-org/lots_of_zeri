# ZAC SPARQL Query Templates

prefixes: |
  PREFIX crm: <http://www.cidoc-crm.org/cidoc-crm/>
  PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
  PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
  PREFIX aat: <http://vocab.getty.edu/aat/>
  PREFIX zac: <http://w3id.org/zac/>

# ─────────────────────────────────────────
# FACET VALUE QUERIES
# Key format: {tab}__{facet_id}
# Each query MUST return:
#   ?facetURI   (URI dell'entità — usato come valore del filtro)
#   ?facetValue (label display — mostrato nell'UI)
#   ?count      (int)
# Per le faccette non-entità (anno, boolean) ?facetURI = ?facetValue (stringa).
# {FILTERS} iniettato escludendo la faccetta corrente (cross-filtering).
# ─────────────────────────────────────────
facet_queries:

  eventi_asta__organizzatore: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_act .
      ?sub_act crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      ?house rdfs:label ?facetValue .
      BIND(?house AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__banditore: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_act .
      ?sub_act a crm:E7_Activity ;
        crm:P2_has_type zac:auctioneering ;
        crm:P14_carried_out_by ?auctioneer .
      ?auctioneer rdfs:label ?facetValue .
      BIND(?auctioneer AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__tipologia_oggetti: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P125_used_objects_of_type ?obj_type .
      ?obj_type crm:P2_has_type zac:object_type ;
        rdfs:label ?facetValue .
      BIND(?obj_type AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__cronologia_oggetti: |
      SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
      WHERE {
        ?auction a crm:E7_Activity ;
          crm:P2_has_type aat:300054751 ;
          crm:P125_used_objects_of_type ?obj_period .
        ?obj_period crm:P2_has_type zac:object_period ;
          rdfs:label ?facetValue .
        BIND(?obj_period AS ?facetURI)
        {FILTERS}
      }
      GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__periodo__range: |
    SELECT (MIN(?ys) AS ?minYear) (MAX(?ye) AS ?maxYear)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P4_has_time-span ?ts .
      ?ts crm:P82a_begin_of_the_begin ?dateStart ;
          crm:P82b_end_of_the_end ?dateEnd .
      BIND(YEAR(?dateStart) AS ?ys)
      BIND(YEAR(?dateEnd) AS ?ye)
      {FILTERS}
    }

  eventi_asta__luogo: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P7_took_place_at ?place .
      ?place rdfs:label ?facetValue .
      BIND(?place AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  eventi_asta__collezione: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P16_used_specific_object ?coll .
      ?coll a crm:E78_Curated_Holding ;
        rdfs:label ?facetValue .
      BIND(?coll AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  # eventi_asta__collezione:
  #   multiselect: |
  #     ?auction crm:P16_used_specific_object ?coll .
  #     ?coll a crm:E78_Curated_Holding .
  #     VALUES ?coll { {values_clause} }

  # boolean: ?facetURI = ?facetValue (stringa "true"/"false")
  cataloghi__illustrazioni: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ; crm:P2_has_type aat:300026068 .
      OPTIONAL { ?doc crm:P2_has_type zac:illustrated . BIND("true" AS ?ill) }
      BIND(IF(BOUND(?ill), "true", "false") AS ?facetValue)
      BIND(IF(BOUND(?ill), "true", "false") AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue

  # anno: ?facetURI = ?facetValue (stringa anno)
  cataloghi__anno_pubblicazione: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P94i_was_created_by ?cr .
      ?cr crm:P82_at_some_time_within ?y .
      BIND(STR(YEAR(?y)) AS ?facetValue)
      BIND(STR(YEAR(?y)) AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY ?facetValue

  cataloghi__anno_pubblicazione__range: |
    SELECT (MIN(YEAR(?y)) AS ?minYear) (MAX(YEAR(?y)) AS ?maxYear)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P94i_was_created_by ?cr .
      ?cr crm:P82_at_some_time_within ?y .
      {FILTERS}
    }

  cataloghi__lingua: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P72_has_language ?lang .
      ?lang rdfs:label ?facetValue .
      FILTER(LANG(?facetValue) = "it" || LANG(?facetValue) = "")
      BIND(?lang AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 100

  cataloghi__autori: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P94i_was_created_by ?creation .
      ?assign a crm:E13_Attribute_Assignment ;
        crm:P140_assigned_attribute_to ?creation ;
        crm:P141_assigned ?contrib .
      ?contrib rdfs:label ?facetValue .
      BIND(?contrib AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200

  cataloghi__collezione: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P70_documents ?auction .
      ?auction crm:P16_used_specific_object ?coll .
      ?coll a crm:E78_Curated_Holding ;
            rdfs:label ?facetValue .
      BIND(?coll AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY ?facetValue LIMIT 200

  cataloghi__luogo: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P70_documents ?auction .
      ?auction crm:P7_took_place_at ?place .
      ?place rdfs:label ?facetValue .
      BIND(?place AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY ?facetValue LIMIT 200

  cataloghi__tipologia_oggetti: |
    SELECT ?facetURI ?facetValue (COUNT(DISTINCT ?doc) AS ?count)
    WHERE {
      ?doc a crm:E31_Document ;
           crm:P2_has_type aat:300026068 ;
           crm:P70_documents ?auction .
      ?auction crm:P2_has_type ?obj_type .
      ?obj_type crm:P2_has_type zac:object_type ;
                rdfs:label ?facetValue .
      BIND(?obj_type AS ?facetURI)
      {FILTERS}
    }
    GROUP BY ?facetURI ?facetValue ORDER BY DESC(?count) LIMIT 200


# ─────────────────────────────────────────
# FILTER SNIPPETS
# Per multiselect: VALUES su ?uri (non sulla label).
# Placeholder {values_clause} = lista di URI angolati: <uri1> <uri2>
# ─────────────────────────────────────────
filter_snippets:

  eventi_asta__periodo:
    year_range: |
      ?auction crm:P4_has_time-span ?ts .
      ?ts crm:P82a_begin_of_the_begin ?dateStart .
      FILTER(YEAR(?dateStart) >= {year_from} && YEAR(?dateStart) <= {year_to})

  eventi_asta__organizzatore:
    multiselect: |
      ?auction crm:P9_consists_of ?organisation .
      ?organisation crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      VALUES ?house { {values_clause} }

  eventi_asta__banditore:
    multiselect: |
      ?auction crm:P9_consists_of ?auctioneering .
      ?auctioneering crm:P2_has_type zac:auctioneering ;
        crm:P14_carried_out_by ?auctioneer .
      VALUES ?auctioneer { {values_clause} }

  eventi_asta__tipologia_oggetti:
    multiselect: |
      ?auction crm:P125_used_objects_of_type ?obj_type .
      ?obj_type crm:P2_has_type zac:object_type .
      VALUES ?obj_type { {values_clause} }

  eventi_asta__cronologia_oggetti:
      multiselect: |
        ?auction crm:P125_used_objects_of_type ?obj_period .
        ?obj_period crm:P2_has_type zac:object_period .
        VALUES ?obj_period { {values_clause} }

  eventi_asta__luogo:
    multiselect: |
      ?auction crm:P7_took_place_at ?place .
      VALUES ?place { {values_clause} }

  eventi_asta__collezione:
    multiselect: |
      ?auction crm:P16_used_specific_object ?coll .
      ?coll a crm:E78_Curated_Holding .
      VALUES ?coll { {values_clause} }

  # Ricerca libera per parola chiave — usata dalla barra di ricerca
  # Effettua la corrispondenza su: etichetta asta, casa d'asta, banditore, luogo
  eventi_asta___search:
    text_search: |
      ?auction rdfs:label ?searchLabel .
      FILTER(CONTAINS(LCASE(STR(?searchLabel)), LCASE("{text_value}")))

  cataloghi__anno_pubblicazione:
    year_range: |
      ?doc crm:P94i_was_created_by ?cr_yr .
      ?cr_yr crm:P82_at_some_time_within ?filter_yr .
      FILTER(YEAR(?filter_yr) >= {year_from} && YEAR(?filter_yr) <= {year_to})

  cataloghi__lingua:
    multiselect: |
      ?doc crm:P72_has_language ?lang .
      VALUES ?lang { {values_clause} }

  cataloghi__illustrazioni:
    boolean_true: |
      ?doc crm:P2_has_type zac:illustrated .
    boolean_false: |
      FILTER NOT EXISTS { ?doc crm:P2_has_type zac:illustrated . }

  cataloghi__autori:
    multiselect: |
      ?doc crm:P94i_was_created_by ?cr_c .
      ?asg_f a crm:E13_Attribute_Assignment ;
        crm:P140_assigned_attribute_to ?cr_c ;
        crm:P141_assigned ?contrib_f .
      VALUES ?contrib_f { {values_clause} }

  cataloghi__collezione:
    multiselect: |
      ?doc crm:P70_documents ?auction .
      ?auction crm:P16_used_specific_object ?coll_f .
      ?coll_f a crm:E78_Curated_Holding .
      VALUES ?coll_f { {values_clause} }

  cataloghi__luogo:
    multiselect: |
      ?doc crm:P70_documents ?auction .
      ?auction crm:P7_took_place_at ?place_f .
      VALUES ?place_f { {values_clause} }

  cataloghi__tipologia_oggetti:
    multiselect: |
      ?doc crm:P70_documents ?auction .
      ?auction crm:P2_has_type ?obj_type_f .
      ?obj_type_f crm:P2_has_type zac:object_type .
      VALUES ?obj_type_f { {values_clause} }

  # Ricerca libera per parola chiave — usata dalla barra di ricerca
  # Effettua la corrispondenza su: titolo (ma dovrebbe anche.. sottotitolo, identificativo, autori/casa d'asta)
  cataloghi___search:
    text_search: |
      ?doc crm:P102_has_title ?searchTitleNode .
      ?searchTitleNode rdfs:label ?searchLabel .
      FILTER(CONTAINS(LCASE(STR(?searchLabel)), LCASE("{text_value}")))


# ─────────────────────────────────────────
# MAIN RESULT QUERIES
# ─────────────────────────────────────────
results:

  eventi_asta: |
    SELECT ?auction
           (MIN(?auctionLabel0) AS ?auctionLabel)
           (MIN(?houseLabel0)   AS ?houseLabel)
           (MIN(?yearLabel0)    AS ?yearLabel)
           (MIN(?placeLabel0)   AS ?placeLabel)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 .
      OPTIONAL {
        ?auction crm:P9_consists_of ?organisation .
        ?organisation crm:P2_has_type zac:auction_organisation ;
          crm:P14_carried_out_by ?house .
        ?house rdfs:label ?houseLabel0 .
      }
      OPTIONAL { ?auction rdfs:label ?auctionLabel0 }
      OPTIONAL {
        ?auction crm:P4_has_time-span ?ts .
        ?ts rdfs:label ?yearLabel0 .
      }
      OPTIONAL {
        ?auction crm:P7_took_place_at ?place .
        ?place rdfs:label ?placeLabel0 .
      }
      {FILTERS}
    }
    GROUP BY ?auction
    ORDER BY {ORDER}
    LIMIT {limit}
    OFFSET {offset}

  eventi_asta_count: |
    SELECT (COUNT(DISTINCT ?auction) AS ?total)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 .
      {FILTERS}
    }

  catalogo: |
    SELECT ?doc ?year ?docId ?zeriUrl
           (SAMPLE(?title0)       AS ?title)
           (SAMPLE(?houseLabel0)  AS ?houseLabel)
           (SAMPLE(?langLabel0)   AS ?langLabel)
           (SAMPLE(?illustrated0) AS ?illustrated)
    WHERE {
        {
          SELECT ?doc (MIN(?y) AS ?year) (MIN(?id) AS ?docId)
          WHERE {
            ?doc a crm:E31_Document ;
                 crm:P2_has_type aat:300026068 .
            OPTIONAL {
              ?doc crm:P94i_was_created_by ?creation .
              ?creation crm:P82_at_some_time_within ?y .
            }
            OPTIONAL {
              ?doc crm:P48_has_preferred_identifier ?idNode .
              ?idNode rdfs:label ?id .
            }
            {FILTERS}
          }
          GROUP BY ?doc
          ORDER BY {ORDER}
          LIMIT {limit}
          OFFSET {offset}
        }
        OPTIONAL {
          ?doc crm:P102_has_title ?tn .
          ?tn crm:P2_has_type zac:primary_title ; rdfs:label ?title0 .
        }
        OPTIONAL {
          ?doc crm:P72_has_language ?lang2 .
          ?lang2 rdfs:label ?langLabel0 .
        }
        OPTIONAL {
          ?doc crm:P94i_was_created_by ?creation .
          ?creation crm:P14_carried_out_by ?house .
          ?house rdfs:label ?houseLabel0 .
        }
        OPTIONAL {
          ?doc crm:P2_has_type zac:illustrated .
          BIND("true" AS ?illustrated0)
        }
        OPTIONAL {
          ?doc crm:P70i_is_documented_in ?zrec .
          ?zrec crm:P1_is_identified_by ?zid .
          ?zid crm:P190_has_symbolic_content ?zeriUrl .
        }
    }
    GROUP BY ?doc ?year ?docId ?zeriUrl
    ORDER BY {ORDER}

  catalogo_count: |
    SELECT (COUNT(DISTINCT ?doc) AS ?total)
    WHERE {
      ?doc a crm:E31_Document ;
        crm:P2_has_type aat:300026068 .
      {FILTERS}
    }


# ─────────────────────────────────────────
# DETAIL QUERIES
# ─────────────────────────────────────────
detail:

  # ── CATALOGO ───────────────────────────────────────────────────

  # Campi scalari + chiavi per i link interni (auctionSlug, docId)
  catalogo_scalars: |
    SELECT DISTINCT ?title ?secTitle ?year ?illustrated ?docId ?auction ?auctionSlug ?auctionLabel
    WHERE {
        <{uri}> a crm:E31_Document .
        OPTIONAL { <{uri}> crm:P48_has_preferred_identifier ?idNode . ?idNode rdfs:label ?docId }
        OPTIONAL {
          <{uri}> crm:P102_has_title ?tn .
          ?tn crm:P2_has_type zac:primary_title ; rdfs:label ?title .
        }
        OPTIONAL {
          <{uri}> crm:P102_has_title ?tn2 .
          ?tn2 crm:P2_has_type zac:secondary_title ; rdfs:label ?secTitle .
        }
        OPTIONAL {
          <{uri}> crm:P94i_was_created_by ?cr .
          ?cr crm:P82_at_some_time_within ?year .
        }

        BIND(IF(EXISTS { <{uri}> crm:P2_has_type zac:illustrated }, "Sì", "No") AS ?illustrated)

        OPTIONAL {
          <{uri}> crm:P70_documents ?auction .
          ?auction rdfs:label ?auctionLabel .
          BIND(REPLACE(STR(?auction), "^.*/", "") AS ?auctionSlug)
        }
    }
    LIMIT 1

  catalogo_author: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P94i_was_created_by ?cr_c .
        ?asg_f a crm:E13_Attribute_Assignment ;
          crm:P140_assigned_attribute_to ?cr_c ;
          crm:P141_assigned ?house ;
          crm:P2_has_type aat:300025492 .
        BIND(?house AS ?uri)
        ?house rdfs:label ?value .
    }
    ORDER BY ?value

  catalogo_secondary_author_organisation: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P94i_was_created_by ?cr_c .
        ?asg_f a crm:E13_Attribute_Assignment ;
          crm:P140_assigned_attribute_to ?cr_c ;
          crm:P141_assigned ?org ;
          crm:P2_has_type zac:secondary_author .
        ?org a crm:E74_Group.
        BIND(?org AS ?uri)
        ?org rdfs:label ?value .
    }
    ORDER BY ?value
  
  catalogo_secondary_author_person: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P94i_was_created_by ?cr_c .
        ?asg_f a crm:E13_Attribute_Assignment ;
          crm:P140_assigned_attribute_to ?cr_c ;
          crm:P141_assigned ?prs ;
          crm:P2_has_type zac:secondary_author .
        ?prs a crm:E21_Person.
        BIND(?prs AS ?uri)
        ?prs rdfs:label ?value .
    }
    ORDER BY ?value
    
  catalogo_auctioneer: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P70_documents ?auction .
        ?auction crm:P9_consists_of ?auctioneering .
        ?auctioneering crm:P2_has_type zac:auctioneering ;
          crm:P14_carried_out_by ?auct .
        BIND(?auct AS ?uri)
        ?auct rdfs:label ?value .
    }
    ORDER BY ?value

  # Lingue (multivalore)
  catalogo_languages: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P72_has_language ?lang .
        BIND(?lang AS ?uri)
        ?lang rdfs:label ?value .
    }
    ORDER BY ?value

  # Correlati: altri cataloghi dello stesso anno (escluso il corrente)
  # {me} = URI corrente, {year} = anno (passato dal router dopo gli scalari)
  catalogo_related_year: |
    SELECT DISTINCT ?uri ?docId ?title ?year
    WHERE {
        ?uri a crm:E31_Document ;
             crm:P2_has_type aat:300026068 ;
             crm:P94i_was_created_by ?cr .
        ?cr crm:P82_at_some_time_within ?year .
        FILTER(YEAR(?year) = {year})
        FILTER(?uri != <{me}>)
        OPTIONAL { ?uri crm:P48_has_preferred_identifier ?docId }
        OPTIONAL {
          ?uri crm:P102_has_title ?tn .
          ?tn crm:P2_has_type zac:primary_title ; rdfs:label ?title .
        }
    }
    ORDER BY ?title
    LIMIT 12

  # ── EVENTO ─────────────────────────────────────────────────────
 
  evento_scalars: |
    SELECT DISTINCT
      ?label ?houseURI ?house
      ?dateStart ?dateEnd
      ?placeURI ?place
      ?auctionCode ?docSlug ?docLabel
    WHERE {
        <{uri}> a crm:E7_Activity .
        OPTIONAL { <{uri}> rdfs:label ?label }
 
        # organizzatore (scalar: prima casa d'asta trovata — per il link related)
        OPTIONAL {
          <{uri}> crm:P9_consists_of ?org .
          ?org crm:P2_has_type zac:auction_organisation ;
            crm:P14_carried_out_by ?houseURI .
          ?houseURI rdfs:label ?house .
        }
 
        # date inizio / fine (P82a, P82b)
        OPTIONAL {
          <{uri}> crm:P4_has_time-span ?ts .
          ?ts crm:P82a_begin_of_the_begin ?dateStart .
          ?ts crm:P82b_end_of_the_end ?dateEnd .
        }
 
        # luogo
        OPTIONAL {
          <{uri}> crm:P7_took_place_at ?placeURI .
          ?placeURI rdfs:label ?place .
        }
 
        # codice asta (identificatore preferito dell'evento stesso)
        OPTIONAL {
          <{uri}> crm:P48_has_preferred_identifier ?codeNode .
          ?codeNode rdfs:label ?auctionCode .
        }
 
        # catalogo collegato
        OPTIONAL {
          ?doc crm:P70_documents <{uri}> .
          ?doc rdfs:label ?docLabel .
          BIND(REPLACE(STR(?doc), "^.*/", "") AS ?docSlug)
        }
    }
    LIMIT 1
 
  # Organizzatori (multivalore — E74_Group)
  evento_organizzatori: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P9_consists_of ?org .
        ?org crm:P2_has_type zac:auction_organisation ;
          crm:P14_carried_out_by ?house .
        BIND(?house AS ?uri)
        ?house rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Organizzazioni coinvolte (multivalore — qualsiasi E74_Group non già organizzatore)
  evento_organizzazioni: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P9_consists_of ?sub .
        ?sub crm:P14_carried_out_by ?org .
        ?org a crm:E74_Group .
        FILTER NOT EXISTS {
          ?sub crm:P2_has_type zac:auction_organisation .
        }
        BIND(?org AS ?uri)
        ?org rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Banditori (multivalore)
  evento_banditori: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P9_consists_of ?auc .
        ?auc crm:P2_has_type zac:auctioneering ;
          crm:P14_carried_out_by ?auct .
        BIND(?auct AS ?uri)
        ?auct rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Persone coinvolte (multivalore — E21_Person non banditore)
  evento_persone: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P9_consists_of ?sub .
        ?sub crm:P14_carried_out_by ?person .
        ?person a crm:E21_Person .
        FILTER NOT EXISTS {
          ?sub crm:P2_has_type zac:auctioneering .
        }
        BIND(?person AS ?uri)
        ?person rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Collezioni in vendita (multivalore — E78_Curated_Holding)
  evento_collezioni: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P16_used_specific_object ?coll .
        ?coll a crm:E78_Curated_Holding .
        BIND(?coll AS ?uri)
        ?coll rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Tipologie oggetti (multivalore)
  evento_object_types: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P125_used_objects_of_type ?otype .
        ?otype crm:P2_has_type zac:object_type .
        BIND(?otype AS ?uri)
        ?otype rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Cronologia oggetti (multivalore)
  evento_object_periods: |
    SELECT DISTINCT ?uri ?value
    WHERE {
        <{uri}> crm:P125_used_objects_of_type ?otype .
        ?otype crm:P2_has_type zac:object_period .
        BIND(?otype AS ?uri)
        ?otype rdfs:label ?value .
    }
    ORDER BY ?value
 
  # Correlati: altre aste della stessa casa d'asta (organizzatore), escluso il corrente
  # {house} = label casa (passata dal router dopo gli scalari)
  evento_related_house: |
    SELECT DISTINCT ?uri ?label ?house ?yearLabel ?place
    WHERE {
        ?uri a crm:E7_Activity ;
             crm:P2_has_type aat:300054751 ;
             crm:P9_consists_of ?org .
        ?org crm:P2_has_type zac:auction_organisation ;
             crm:P14_carried_out_by ?h .
        ?h rdfs:label ?house .
        FILTER(STR(?house) = "{house}")
        FILTER(?uri != <{me}>)
        OPTIONAL { ?uri rdfs:label ?label }
        OPTIONAL { ?uri crm:P4_has_time-span ?ts . ?ts rdfs:label ?yearLabel . }
        OPTIONAL { ?uri crm:P7_took_place_at ?pl . ?pl rdfs:label ?place . }
    }
    ORDER BY ?yearLabel
    LIMIT 12

# ══════════════════════════════════════════════════════════
# ESPLORA — query di aggregazione piatta per /api/esplora/*
# Da appendere a sparql_queries.yaml come chiave top-level `esplora:`.
# Ogni query restituisce righe piatte; il pivot/shaping avviene
# in backend/routers/esplora.py (stessa logica di genera_json_esplora.py).
# ══════════════════════════════════════════════════════════
esplora:

  # eventi per anno (base per eventi_per_anno.json e trend_mercato.ytotals)
  eventi_anno: |
    SELECT ?year (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P4_has_time-span ?ts .
      ?ts crm:P82a_begin_of_the_begin ?d .
      BIND(YEAR(?d) AS ?year)
    }
    GROUP BY ?year ORDER BY ?year

  # casa d'asta × anno (case_dasta.json → py)
  case_anno: |
    SELECT ?houseLabel ?year (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_act ;
        crm:P4_has_time-span ?ts .
      ?sub_act crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      ?house rdfs:label ?houseLabel .
      ?ts crm:P82a_begin_of_the_begin ?d .
      BIND(YEAR(?d) AS ?year)
    }
    GROUP BY ?houseLabel ?year

  # casa d'asta × luogo (case_dasta.json → city = luogo modale)
  case_luogo: |
    SELECT ?houseLabel ?placeLabel (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_act ;
        crm:P7_took_place_at ?place .
      ?sub_act crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      ?house rdfs:label ?houseLabel .
      ?place rdfs:label ?placeLabel .
    }
    GROUP BY ?houseLabel ?placeLabel

  # banditore × casa (banditori.json: all/top_band/case/edges)
  # OPTIONAL sull'organizzatore: banditore senza casa = "autorganizzato"
  banditori_case: |
    SELECT ?bandLabel ?houseLabel (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P9_consists_of ?sub_band .
      ?sub_band a crm:E7_Activity ;
        crm:P2_has_type zac:auctioneering ;
        crm:P14_carried_out_by ?band .
      ?band rdfs:label ?bandLabel .
      OPTIONAL {
        ?auction crm:P9_consists_of ?sub_org .
        ?sub_org crm:P2_has_type zac:auction_organisation ;
          crm:P14_carried_out_by ?house .
        ?house rdfs:label ?houseLabel .
      }
    }
    GROUP BY ?bandLabel ?houseLabel

  # luogo × anno (geografia_decenni.json + trend_mercato.json → py città)
  luoghi_anno: |
    SELECT ?placeLabel ?year (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P7_took_place_at ?place ;
        crm:P4_has_time-span ?ts .
      ?place rdfs:label ?placeLabel .
      ?ts crm:P82a_begin_of_the_begin ?d .
      BIND(YEAR(?d) AS ?year)
    }
    GROUP BY ?placeLabel ?year

  # luogo × casa (trend_mercato.json → org principale per città)
  luoghi_case: |
    SELECT ?placeLabel ?houseLabel (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P7_took_place_at ?place ;
        crm:P9_consists_of ?sub_act .
      ?place rdfs:label ?placeLabel .
      ?sub_act crm:P2_has_type zac:auction_organisation ;
        crm:P14_carried_out_by ?house .
      ?house rdfs:label ?houseLabel .
    }
    GROUP BY ?placeLabel ?houseLabel

  # tipologia oggetti × anno (tipologie_oggetti.json)
  tipologie_anno: |
    SELECT ?tipoLabel ?year (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P125_used_objects_of_type ?obj_type ;
        crm:P4_has_time-span ?ts .
      ?obj_type crm:P2_has_type zac:object_type ;
        rdfs:label ?tipoLabel .
      ?ts crm:P82a_begin_of_the_begin ?d .
      BIND(YEAR(?d) AS ?year)
    }
    GROUP BY ?tipoLabel ?year

  # collezione × evento (collezioni.json — righe NON aggregate:
  # servono anno e casa per evento per tag anno/casa/diverse)
  collezioni_eventi: |
    SELECT DISTINCT ?auction ?collLabel ?year ?houseLabel
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P16_used_specific_object ?coll ;
        crm:P4_has_time-span ?ts .
      ?coll a crm:E78_Curated_Holding ;
        rdfs:label ?collLabel .
      ?ts crm:P82a_begin_of_the_begin ?d .
      BIND(YEAR(?d) AS ?year)
      OPTIONAL {
        ?auction crm:P9_consists_of ?sub_act .
        ?sub_act crm:P2_has_type zac:auction_organisation ;
          crm:P14_carried_out_by ?house .
        ?house rdfs:label ?houseLabel .
      }
    }

  # ── ATTENZIONE: stagionalita e cataloghi_per_paese ──
  # Nei JSON attuali il "paese" viene dal FONDO archivistico dell'Excel,
  # che (probabilmente) non è nel triplestore. Se esiste un path
  # luogo→paese (es. ?place crm:P89_falls_within ?country) sostituiscilo
  # qui sotto; altrimenti questi due restano statici.
  stagionalita_paese_mese: |
    SELECT ?paeseLabel ?month (COUNT(DISTINCT ?auction) AS ?count)
    WHERE {
      ?auction a crm:E7_Activity ;
        crm:P2_has_type aat:300054751 ;
        crm:P7_took_place_at ?place ;
        crm:P4_has_time-span ?ts .
      # TODO: verificare il path reale luogo→paese nel grafo
      ?place crm:P89_falls_within ?country .
      ?country rdfs:label ?paeseLabel .
      ?ts crm:P82a_begin_of_the_begin ?d .
      BIND(MONTH(?d) AS ?month)
      BIND(YEAR(?d) AS ?year)
      FILTER(?year >= 1879 && ?year <= 1929)
    }
    GROUP BY ?paeseLabel ?month